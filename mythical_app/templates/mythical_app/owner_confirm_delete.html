{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Delete Owner | Mythical Mane</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div class="max-w-3xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        <div class="mb-8">
            <h1 class="text-3xl font-semibold">Delete Owner</h1>
            <p class="mt-2 text-sm text-slate-600">Confirm that you want to delete this owner record.</p>
        </div>

        <div class="rounded-xl bg-white p-8 shadow-sm border border-slate-200">
            <p class="text-slate-700">Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>
            <form method="post" class="mt-6">
                {% csrf_token %}
                <div class="flex gap-3">
                    <button type="submit" class="inline-flex justify-center rounded-md bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700">Delete</button>
                    <a href="{% url 'owner_list' %}" class="inline-flex justify-center rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
